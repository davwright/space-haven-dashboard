<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Space Haven Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Space Haven Dashboard <span id="app-version" class="ver" title="package version">v…</span></h1>
    <nav>
      <button data-view="status" class="active">Status</button>
      <button data-view="skills">Skills</button>
      <button data-view="nutrition">Nutrition</button>
      <button data-view="storage">Storage</button>
      <button data-view="galaxy">Map</button>
    </nav>
    <div class="hdr-right">
      <span id="day-pill">Day —</span>
      <span class="live-indicator" id="live"><span class="dot"></span>Live</span>
      <span class="live-indicator off" id="agent" title="Java agent streaming status"><span class="dot"></span><span id="agent-label">Agent: offline</span></span>
      <span class="live-indicator off" id="renderer" title="Renderer mode: snapshot replacements vs incremental live patches"><span class="dot"></span><span id="renderer-label">Renderer: snapshot mode</span></span>
    </div>
  </header>

  <main>

    <!-- ====== STATUS VIEW ====== -->
    <section id="view-status" class="view active">
      <div class="toolbar">
        <label class="toggle">
          <input type="checkbox" id="needs-attention"> needs attention only
        </label>
        <span class="muted" id="crew-count"></span>
      </div>
      <div class="table-wrap">
        <table class="crew-table">
          <thead>
            <tr>
              <th data-sort="name" class="sort-active">Name</th>
              <th data-sort="mood">Mood</th>
              <th data-sort="health">Health</th>
              <th data-sort="food">Food</th>
              <th data-sort="rest">Rest</th>
              <th data-sort="comfort">Comfort</th>
              <th data-sort="oxygen">O₂</th>
              <th data-sort="temperature">Temp</th>
              <th>Conditions</th>
            </tr>
          </thead>
          <tbody id="status-body"></tbody>
        </table>
      </div>
    </section>

    <!-- ====== SKILLS VIEW ====== -->
    <section id="view-skills" class="view">
      <div class="toolbar">
        <span class="muted" id="skills-count"></span>
        <a href="#" id="skills-reset" class="reset-sort" hidden>Reset sort</a>
      </div>
      <div class="table-wrap">
        <table class="crew-table skills-table">
          <thead>
            <tr id="skills-head"></tr>
          </thead>
          <tbody id="skills-body"></tbody>
        </table>
      </div>
    </section>

    <!-- ====== NUTRITION VIEW ====== -->
    <section id="view-nutrition" class="view">
      <div class="toolbar">
        <label class="toggle">
          <input type="checkbox" id="hunger-only"> show only crew in food distress
        </label>
      </div>
      <div class="nutrition-page">
        <div class="food-top">
          <div class="food-panel" id="food-storage-panel">
            <div class="food-panel-head">Food in storage</div>
            <div class="food-panel-body" id="food-storage-body"></div>
          </div>
          <div class="food-panel" id="recipes-panel">
            <div class="food-panel-head">
              <span>Kitchen recipes</span>
              <span class="recipe-toggle">
                <button class="rt-btn active" data-recipe-filter="makeable">Makeable now</button>
                <button class="rt-btn" data-recipe-filter="all">All recipes</button>
              </span>
            </div>
            <div class="food-panel-body" id="recipes-body"></div>
          </div>
        </div>
        <div class="nutrition-grid" id="nutrition-grid"></div>
      </div>
    </section>

    <!-- ====== STORAGE VIEW ====== -->
    <section id="view-storage" class="view">
      <div class="toolbar">
        <span class="muted" id="storage-count"></span>
      </div>
      <div class="storage-page">
        <div id="storage-list" class="storage-list"></div>
      </div>
    </section>

    <!-- ====== GALAXY VIEW ====== -->
    <section id="view-galaxy" class="view">
      <div id="galaxy-canvas-wrap">
        <svg id="galaxy-svg" preserveAspectRatio="xMidYMid meet"></svg>
        <div id="tooltip" hidden></div>
      </div>
      <div id="slider-bar">
        <button id="play-btn" title="Play / pause">&#9654;</button>
        <input type="range" id="day-slider" min="0" max="0" value="0" step="1">
        <span id="day-label">Day 0</span>
        <span id="day-range" class="muted"></span>
      </div>
    </section>
  </main>

  <script src="state.js"></script>
  <script src="app.js"></script>
</body>
</html>
